version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: jurissync_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: jurissync_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jurissync_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/jurissync_prod
      - ENV=production
      - DATAJUD_API_KEY=your_key_here
      - DATAJUD_API_URL=https://api-publica.datajud.cnj.jus.br
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
